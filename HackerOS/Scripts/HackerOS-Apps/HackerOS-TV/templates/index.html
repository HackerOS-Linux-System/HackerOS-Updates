<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerOS TV</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="{{ settings.theme }}">
    <div class="container">
        <img src="/static/HackerOS-TV.png" alt="HackerOS TV Logo" class="logo">
        <div class="buttons">
            <h1>HackerOS TV</h1>
            <div class="grid">
                {% for button in buttons %}
                <div class="button-container" title="{{ button.url }}">
                    <button class="neon-button" onclick="openUrl('{{ button.name }}')">
                        <img src="/static/icons/{{ button.icon }}" alt="{{ button.name }} icon" class="button-icon">
                        {{ button.name }}
                    </button>
                    <span class="remove-btn" onclick="removeButton('{{ button.name }}')">×</span>
                </div>
                {% endfor %}
                <div class="button-container add-button-container">
                    <input type="text" id="newButtonName" placeholder="Button name">
                    <input type="url" id="newButtonUrl" placeholder="URL">
                    <input type="text" id="newButtonIcon" placeholder="Icon filename (optional)">
                    <button class="neon-button add-button" onclick="addButton()">Add</button>
                </div>
            </div>
        </div>
        <div class="settings">
            <h3>Settings</h3>
            <label class="settings-label">Volume: <input type="range" id="volumeSlider" min="0" max="100" value="{{ settings.volume }}"></label>
            <label class="settings-label">Brightness: <input type="range" id="brightnessSlider" min="0" max="100" value="{{ settings.brightness }}"></label>
            <label class="toggle-label">
                Dark Theme
                <input type="checkbox" id="themeToggle" {% if settings.theme == 'dark' %}checked{% endif %}>
                <span class="slider round"></span>
            </label>
            <label class="toggle-label">
                Fullscreen
                <input type="checkbox" id="fullscreenToggle" {% if settings.fullscreen %}checked{% endif %}>
                <span class="slider round"></span>
            </label>
        </div>
    </div>
    <div class="loader hidden"></div>
    <script>
        async function openUrl(name) {
            showLoader();
            await fetch(`/open/${name}`);
            hideLoader();
        }

        async function addButton() {
            const name = document.getElementById("newButtonName").value;
            const url = document.getElementById("newButtonUrl").value;
            const icon = document.getElementById("newButtonIcon").value || "default.png";
            if (name && url) {
                showLoader();
                await fetch("/add_button", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, url, icon })
                });
                location.reload();
            }
        }

        async function removeButton(name) {
            showLoader();
            await fetch(`/remove_button/${name}`, { method: "POST" });
            location.reload();
        }

        document.getElementById("volumeSlider").addEventListener("input", async (e) => {
            await fetch(`/set_volume/${e.target.value}`, { method: "POST" });
        });

        document.getElementById("brightnessSlider").addEventListener("input", async (e) => {
            await fetch(`/set_brightness/${e.target.value}`, { method: "POST" });
        });

        document.getElementById("themeToggle").addEventListener("change", async (e) => {
            const theme = e.target.checked ? "dark" : "light";
            await fetch(`/set_theme/${theme}`, { method: "POST" });
            document.body.className = theme;
        });

        document.getElementById("fullscreenToggle").addEventListener("change", async (e) => {
            await fetch(`/set_fullscreen/${e.target.checked}`, { method: "POST" });
            if (e.target.checked) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        function showLoader() {
            document.querySelector(".loader").classList.remove("hidden");
        }

        function hideLoader() {
            document.querySelector(".loader").classList.add("hidden");
        }
    </script>
</body>
</html>
